name: Release & Publish to npm

on:
  schedule:
    # 12時間ごと（UTC 0:00 と 12:00）
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 手動トリガーも可能

jobs:
  check-and-release:
    name: Check for changes & update release branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      new_version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴取得（ブランチ比較に必要）

      - name: Check for changes since last release
        id: check
        run: |
          git fetch origin main release || echo "fetch failed"
          echo "Current HEAD: $(git rev-parse HEAD)"
          echo "origin/main: $(git rev-parse origin/main 2>/dev/null || echo 'not found')"
          echo "origin/release: $(git rev-parse origin/release 2>/dev/null || echo 'not found')"

          if git rev-parse origin/release >/dev/null 2>&1; then
            DIFF=$(git diff --name-only origin/release..HEAD -- crates/ packages/ styles/ Cargo.toml Cargo.lock)
            if [ -z "$DIFF" ]; then
              echo "has_changes=false" >> $GITHUB_OUTPUT
              echo "No code changes since last release"
            else
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "Changes detected:"
              echo "$DIFF"
            fi
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "release branch does not exist, treating as first release"
          fi

      - name: Determine version
        id: version
        if: steps.check.outputs.has_changes == 'true'
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          FULL_VERSION="${VERSION}-${TIMESTAMP}"
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${FULL_VERSION}"

      - name: Fast-forward release branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          MAIN_SHA=$(git rev-parse HEAD)
          git checkout release
          git merge --ff-only $MAIN_SHA
          git push origin release

  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: check-and-release
    if: needs.check-and-release.outputs.has_changes == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install tools
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          npm install -g pnpm

      - name: Run tests
        run: cargo test --workspace

      - name: Build WASM
        run: wasm-pack build crates/vsc-wasm --target web --features gpu

      - name: Prepare @viewscript/wasm
        run: |
          cd crates/vsc-wasm/pkg
          VERSION="${{ needs.check-and-release.outputs.new_version }}"
          cat package.json | jq --arg v "$VERSION" '.name = "@viewscript/wasm" | .version = $v' > tmp.json
          mv tmp.json package.json
          cat package.json

      - name: Publish @viewscript/wasm
        run: npm publish --access public
        working-directory: crates/vsc-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare @viewscript/renderer
        run: |
          cd packages/renderer
          pnpm install --no-frozen-lockfile
          VERSION="${{ needs.check-and-release.outputs.new_version }}"
          cat package.json | jq --arg v "$VERSION" '.version = $v' > tmp.json
          mv tmp.json package.json
          pnpm build || true

      - name: Publish @viewscript/renderer
        run: npm publish --access public
        working-directory: packages/renderer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare @viewscript/browser-defaults
        run: |
          cd packages/browser-defaults
          pnpm install --no-frozen-lockfile
          VERSION="${{ needs.check-and-release.outputs.new_version }}"
          cat package.json | jq --arg v "$VERSION" '.version = $v' > tmp.json
          mv tmp.json package.json
          pnpm build || true

      - name: Publish @viewscript/browser-defaults
        run: npm publish --access public
        working-directory: packages/browser-defaults
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare create-viewscript
        run: |
          cd packages/create-viewscript
          pnpm install --no-frozen-lockfile
          VERSION="${{ needs.check-and-release.outputs.new_version }}"
          cat package.json | jq --arg v "$VERSION" '.version = $v' > tmp.json
          mv tmp.json package.json
          pnpm build

      - name: Publish create-viewscript
        run: npm publish --access public
        working-directory: packages/create-viewscript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-wasi:
    name: Build WASI Binary
    runs-on: ubuntu-latest
    needs: check-and-release
    if: needs.check-and-release.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build WASI binary
        run: cargo build -p vsc-cli --target wasm32-wasip1 --release

      - name: Compress with zstd
        run: |
          sudo apt-get install -y zstd
          zstd --ultra -22 target/wasm32-wasip1/release/vsc.wasm -o vsc-core.wasm.zst
          echo "Uncompressed: $(wc -c < target/wasm32-wasip1/release/vsc.wasm) bytes"
          echo "Compressed:   $(wc -c < vsc-core.wasm.zst) bytes"

      - name: Prepare Cloudflare Pages directory
        run: |
          mkdir -p pages-dist/releases/bin
          mkdir -p pages-dist/releases/version
          cp vsc-core.wasm.zst pages-dist/releases/bin/
          echo "${{ needs.check-and-release.outputs.new_version }}" > pages-dist/releases/version/latest

      - name: Copy docs
        run: cp -r docs/* pages-dist/ 2>/dev/null || true

      - name: Verify structure
        run: |
          echo "=== Pages directory ==="
          find pages-dist/ -type f | sort
          echo ""
          echo "=== version/latest ==="
          cat pages-dist/releases/version/latest
          echo ""
          echo "=== Binary sizes ==="
          ls -la pages-dist/releases/bin/

      - name: Upload pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: pages-dist/

  deploy-pages:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build-wasi, check-and-release]
    if: needs.check-and-release.outputs.has_changes == 'true'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download pages artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: pages-dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pages-dist --project-name=viewscript

  publish-cli:
    name: Publish CLI Binaries
    runs-on: ${{ matrix.os }}
    needs: [check-and-release, build-wasi]
    if: needs.check-and-release.outputs.has_changes == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vsc-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vsc-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vsc-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vsc-windows-x86_64.exe
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Download WASI artifact
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: pages-dist/

      - name: Update embedded WASI binary
        shell: bash
        run: |
          cp pages-dist/releases/bin/vsc-core.wasm.zst crates/vsc-launcher/embedded/vsc-core.wasm.zst
          ls -la crates/vsc-launcher/embedded/

      - name: Build launcher
        run: cargo build -p vsc-launcher --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/vsc.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/vsc ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-and-release, publish-cli]
    if: needs.check-and-release.outputs.has_changes == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-and-release.outputs.new_version }}
          name: v${{ needs.check-and-release.outputs.new_version }}
          body: |
            ## Installation

            ```bash
            curl -fsSL https://viewscript.pages.dev/install.sh | sh
            ```

            ## Downloads

            | Platform | Architecture | Binary |
            |----------|--------------|--------|
            | Linux | x86_64 | vsc-linux-x86_64 |
            | macOS | x86_64 | vsc-macos-x86_64 |
            | macOS | ARM64 | vsc-macos-aarch64 |
            | Windows | x86_64 | vsc-windows-x86_64.exe |

            ## npm Packages

            - `@viewscript/wasm@${{ needs.check-and-release.outputs.new_version }}`
            - `@viewscript/renderer@${{ needs.check-and-release.outputs.new_version }}`
            - `@viewscript/browser-defaults@${{ needs.check-and-release.outputs.new_version }}`
            - `create-viewscript@${{ needs.check-and-release.outputs.new_version }}`
          files: |
            artifacts/vsc-linux-x86_64/vsc-linux-x86_64
            artifacts/vsc-macos-x86_64/vsc-macos-x86_64
            artifacts/vsc-macos-aarch64/vsc-macos-aarch64
            artifacts/vsc-windows-x86_64.exe/vsc-windows-x86_64.exe
          draft: false
          prerelease: false
