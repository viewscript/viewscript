name: vsc-wasm Build & Test

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/vsc-wasm.yml'
      - 'crates/vsc-wasm/**'
      - 'crates/vsc-core/**'
      - 'crates/vsc-gpu/**'
  pull_request:
    paths:
      - '.github/workflows/vsc-wasm.yml'
      - 'crates/vsc-wasm/**'
      - 'crates/vsc-core/**'
      - 'crates/vsc-gpu/**'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build vsc-wasm (default features)
        run: wasm-pack build crates/vsc-wasm --target web

      - name: Build vsc-wasm (gpu feature)
        run: wasm-pack build crates/vsc-wasm --target web --features gpu

      - name: Run native tests
        run: cargo test -p vsc-wasm

  build-wasi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build for WASI
        run: cargo build -p vsc-wasm --target wasm32-wasip1
