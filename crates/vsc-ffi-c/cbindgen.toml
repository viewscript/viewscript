# cbindgen configuration for ViewScript C bindings
# Generate with: cbindgen --config cbindgen.toml --crate vsc-ffi-c --output viewscript.h

language = "C"
include_guard = "VIEWSCRIPT_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit. */"

# Header documentation
header = """
/**
 * ViewScript Constraint Engine C API
 *
 * This header provides C bindings for the ViewScript constraint solver.
 * The engine is headless (no GPU) - rendering is the host's responsibility.
 *
 * ## Quick Start
 *
 * ```c
 * VscEngine* engine = vsc_engine_create();
 *
 * const char* snapshot = "{\"values\":{}}";
 * int result = vsc_engine_tick(engine, snapshot, strlen(snapshot));
 * if (result != 0) {
 *     // Handle error
 * }
 *
 * char buf[4096];
 * int len = vsc_engine_get_scene_json(engine, buf, sizeof(buf));
 * if (len > 0) {
 *     // buf contains the scene graph as JSON
 *     printf("Scene: %s\\n", buf);
 * }
 *
 * vsc_engine_destroy(engine);
 * ```
 *
 * ## Error Codes
 *
 * -  0: Success
 * - -1: Null pointer error
 * - -2: UTF-8 decoding error
 * - -3: JSON parsing error
 * - -4: Solver/internal error
 * - < -100: Buffer too small (|code| - 100 = required size)
 */
"""

# Include paths
include_version = false
cpp_compat = false

[export]
# Only export public C ABI functions
include = [
    "VscEngine",
    "vsc_engine_create",
    "vsc_engine_tick",
    "vsc_engine_get_scene_json",
    "vsc_engine_add_component",
    "vsc_engine_register_q_variable",
    "vsc_engine_destroy",
]

[parse]
parse_deps = false

[fn]
# Function export settings

[struct]
# VscEngine is opaque - don't generate struct definition
derive_eq = false
derive_neq = false
